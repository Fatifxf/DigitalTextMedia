<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>The Meadow</title>
   <link href="https://fonts.googleapis.com/css2?family=Cinzel&family=Playfair+Display:ital,wght@1,500&display=swap" rel="stylesheet">
   <style>
       body {
           margin: 0;
           padding: 0;
           height: 100vh;
           display: flex;
           justify-content: center;
           align-items: center;
           background-image: url('https://wallpapers.com/images/hd/twilight-aesthetic-hifd9578tphdzivr.jpg');
           background-size: cover;
           background-position: center;
           font-family: 'Playfair Display', serif;
           color: white;
       }

       .overlay {
           position: absolute;
           top: 0;
           left: 0;
           width: 100%;
           height: 100%;
           background-color: rgba(0, 0, 0, 0.4);
           z-index: 0;
       }

       .container {
           position: relative;
           z-index: 1;
           display: grid;
           grid-template-columns: 1fr;
           gap: 20px;
           text-align: center;
           padding: 2rem;
           background-color: rgba(20, 20, 30, 0.6);
           border-radius: 15px;
           box-shadow: 0 0 30px rgba(0,0,0,0.6);
       }

       h1 {
           font-family: 'Cinzel', serif;
           font-size: 3rem;
           margin-bottom: 1.5rem;
           text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.6);
       }

       .sentence {
           font-size: 1.2rem;
           line-height: 1.6;
           background: rgba(255, 255, 255, 0.05);
           padding: 1rem;
           border-radius: 10px;
       }

       a {
           color: #ffb6c1;
           font-weight: bold;
           text-decoration: none;
           transition: color 0.3s ease, text-shadow 0.3s ease;
       }

       a:hover {
           color: #ffffff;
           text-shadow: 0 0 5px #ffb6c1;
       }
   </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="container">
        <h1>The Meadow</h1>
        <div class="sentence">Edward in the sunlight was shocking. His skin <a href="page02.html">sparkled</a>, unnatural and mesmerizing.</div>
        <div class="sentence">Bella hesitated. Could something so beautiful still be <a href="page27.html">monstrous</a>?</div>
        <div class="sentence">Or was it proof of something more <a href="page20.html">extraordinary</a>?</div>
    </div>
</body>
</html>
